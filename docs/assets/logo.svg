<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="polars-api logo">
  <title>polars-api</title>

  <!-- Polars-blue rounded-square backdrop (#0075FF — the official Polars
       primary, sampled from pola-rs/polars-static). Rounded geometry mirrors
       the rounded-rectangle language of the real Polars wordmark. -->
  <rect width="256" height="256" rx="48" fill="#0075FF"/>

  <!-- Three DataFrame rows as rounded pills (varied widths to read as data),
       each firing an arrow to the right: "one row at a time" per the README. -->

  <!-- Row 1 -->
  <rect x="40" y="74" width="80" height="18" rx="9" fill="#FFFFFF"/>
  <path d="M132 83 L192 83" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <path d="M184 75 L196 83 L184 91"
        fill="none" stroke="#FFFFFF" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Row 2 -->
  <rect x="40" y="119" width="64" height="18" rx="9" fill="#FFFFFF"/>
  <path d="M116 128 L192 128" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <path d="M184 120 L196 128 L184 136"
        fill="none" stroke="#FFFFFF" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Row 3 -->
  <rect x="40" y="164" width="92" height="18" rx="9" fill="#FFFFFF"/>
  <path d="M144 173 L192 173" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <path d="M184 165 L196 173 L184 181"
        fill="none" stroke="#FFFFFF" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
