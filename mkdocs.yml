site_name: polars-api
repo_url: https://github.com/diegoglozano/polars-api
site_url: https://diegoglozano.github.io/polars-api
site_description: Call REST APIs from a Polars DataFrame, one row at a time, using native Polars expressions. Sync and async GET/POST with per-row URLs, params, and bodies.
site_author: Diego Garcia Lozano
edit_uri: edit/main/docs/
repo_name: diegoglozano/polars-api
copyright: Maintained by <a href="https://diegoglozano.com">diegoglozano</a>.

nav:
  - Home: index.md
  - API reference: documentation.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [polars_api]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: true
            members_order: source
            heading_level: 3
theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/diegoglozano/polars-api
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/polars-api
  meta:
    - name: keywords
      content: polars, polars api, polars rest api, polars http, polars async, dataframe http requests, polars expression api, httpx, python rest api dataframe

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
